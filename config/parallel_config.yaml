# FEPD Parallel Processing Configuration
# 
# This configuration file controls parallel processing behavior for improved
# performance on multi-core systems.

# ============================================================================
# PARALLEL PROCESSING SETTINGS
# ============================================================================

# Enable/disable parallel processing globally
# Set to false for debugging or on systems with limited resources
use_parallel_processing: true

# Maximum number of worker processes for CPU-bound parsing tasks
# null = auto-detect (CPU cores - 1)
# Recommended: Leave as null for auto-detection
# Manual override: Set to specific number (e.g., 4 for quad-core systems)
max_workers: null

# Number of I/O threads for concurrent file extraction
# Higher values improve performance for network/slow storage
# Recommended: 4-8 for local storage, 8-16 for network storage
# INCREASED for faster extraction performance
io_thread_pool_size: 16

# Minimum artifact count to trigger parallel processing
# Below this threshold, serial processing is used (overhead avoidance)
# LOWERED thresholds to use parallel processing more often
parallel_threshold:
  extraction: 3  # artifacts (was 10)
  parsing: 3     # artifacts (was 5)

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Memory management for large datasets
memory:
  # Maximum memory per worker process (MB)
  # null = unlimited
  max_memory_per_worker: 2048
  
  # Enable memory profiling (performance overhead)
  enable_profiling: false

# CPU affinity (advanced)
cpu:
  # Pin worker processes to specific CPU cores
  # null = let OS scheduler decide (recommended)
  affinity: null
  
  # CPU priority for worker processes
  # Options: "normal", "below_normal", "low"
  priority: "normal"

# Progress reporting
progress:
  # Update interval for progress callbacks (seconds)
  update_interval: 0.5
  
  # Enable detailed per-worker logging
  verbose_worker_logs: false

# ============================================================================
# FALLBACK BEHAVIOR
# ============================================================================

# Automatic fallback to serial processing on errors
auto_fallback: true

# Retry failed parsing tasks in serial mode
retry_serial_on_failure: true

# Maximum number of consecutive worker failures before disabling parallel mode
max_worker_failures: 5

# ============================================================================
# PLATFORM-SPECIFIC SETTINGS
# ============================================================================

# Windows-specific
windows:
  # Use 'spawn' multiprocessing context (required on Windows)
  mp_context: "spawn"
  
  # Enable large page support for memory-intensive operations
  large_pages: false

# Linux/macOS-specific
unix:
  # Use 'fork' multiprocessing context (faster startup)
  mp_context: "fork"
  
  # Enable memory mapping for large files
  use_mmap: true

# ============================================================================
# DEBUGGING
# ============================================================================

# Debug settings (disable parallel for troubleshooting)
debug:
  # Force serial processing for all operations
  force_serial: false
  
  # Log worker process lifecycle events
  log_worker_lifecycle: false
  
  # Enable Python multiprocessing debug mode
  mp_debug: false

# ============================================================================
# PERFORMANCE PRESETS
# ============================================================================

# Quick presets for common scenarios
# Uncomment one of the following to use a preset
# (Individual settings above will override preset values)

# Preset: High Performance (large forensic images, powerful workstation)
# use_parallel_processing: true
# max_workers: null  # auto-detect
# io_thread_pool_size: 16

# Preset: Balanced (default, general-purpose)
# use_parallel_processing: true
# max_workers: null  # auto-detect
# io_thread_pool_size: 8

# Preset: Low Resource (laptops, virtual machines)
# use_parallel_processing: true
# max_workers: 2
# io_thread_pool_size: 4

# Preset: Debug (disable parallel for troubleshooting)
# use_parallel_processing: false
# max_workers: 1
# io_thread_pool_size: 1

# ============================================================================
# NOTES
# ============================================================================

# 1. Parallel Processing Benefits:
#    - 2-5x speedup on multi-core systems
#    - Better resource utilization
#    - Reduced total analysis time
#
# 2. When to Disable:
#    - Debugging parser issues
#    - Low-resource systems (< 4GB RAM)
#    - Small forensic images (< 100 artifacts)
#
# 3. Optimal Worker Count:
#    - CPU-bound: cores - 1 (leave 1 for OS)
#    - I/O-bound: 2-4x core count (threads benefit from I/O wait)
#
# 4. Memory Considerations:
#    - Each worker consumes ~500MB-2GB RAM
#    - Monitor system memory usage
#    - Reduce workers if swapping occurs
#
# 5. Network Storage:
#    - Increase io_thread_pool_size (16-32)
#    - Consider network latency in timeouts
#    - Enable compression to reduce bandwidth

# ============================================================================
# BENCHMARKING RESULTS (Reference)
# ============================================================================

# System: Intel i7-9700K (8 cores), 32GB RAM, NVMe SSD
# Image: 50GB Windows 10 disk image (5,000 artifacts)
#
# Configuration              | Time    | Speedup | CPU Usage
# ---------------------------|---------|---------|----------
# Serial (1 worker)          | 45 min  | 1.0x    | 12%
# Parallel (4 workers)       | 15 min  | 3.0x    | 85%
# Parallel (7 workers)       | 11 min  | 4.1x    | 95%
# Parallel (16 workers)      | 12 min  | 3.8x    | 98% (overhead)
#
# Recommendation: Use auto-detect (7 workers for 8-core system)
